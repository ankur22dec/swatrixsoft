<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="600" fill="#f8f9fc"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#4a90e2" opacity="0.08"/>
  <circle cx="500" cy="500" r="100" fill="#7b68ee" opacity="0.08"/>
  
  <!-- Team members -->
  <!-- Person 1 -->
  <g transform="translate(80, 150)">
    <!-- Head -->
    <circle cx="40" cy="35" r="20" fill="#4a90e2"/>
    <!-- Body -->
    <rect x="25" y="60" width="30" height="40" rx="5" fill="#4a90e2"/>
    <!-- Shirt accent -->
    <rect x="22" y="58" width="36" height="8" fill="#7b68ee"/>
  </g>
  
  <!-- Person 2 (center, slightly higher) -->
  <g transform="translate(240, 120)">
    <!-- Head -->
    <circle cx="40" cy="35" r="22" fill="#7b68ee"/>
    <!-- Body -->
    <rect x="24" y="62" width="32" height="45" rx="5" fill="#7b68ee"/>
    <!-- Shirt accent -->
    <rect x="20" y="60" width="40" height="8" fill="#4a90e2"/>
  </g>
  
  <!-- Person 3 -->
  <g transform="translate(400, 150)">
    <!-- Head -->
    <circle cx="40" cy="35" r="20" fill="#4a90e2"/>
    <!-- Body -->
    <rect x="25" y="60" width="30" height="40" rx="5" fill="#4a90e2"/>
    <!-- Shirt accent -->
    <rect x="22" y="58" width="36" height="8" fill="#ff6b6b"/>
  </g>
  
  <!-- Trophy/Achievement symbol -->
  <g transform="translate(250, 280)">
    <!-- Cup -->
    <path d="M 30 40 L 35 20 L 55 20 L 60 40 Q 60 50 45 50 Q 30 50 30 40 Z" 
          fill="#ffd700" stroke="#ff9800" stroke-width="2"/>
    <!-- Base -->
    <rect x="35" y="50" width="30" height="8" fill="#ff9800"/>
    <rect x="28" y="58" width="44" height="4" fill="#ff9800"/>
    <!-- Star on cup -->
    <text x="45" y="38" font-size="16" text-anchor="middle" fill="#ff9800">★</text>
  </g>
  
  <!-- Growth arrow -->
  <g transform="translate(100, 380)">
    <line x1="0" y1="60" x2="0" y2="0" stroke="#4caf50" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-10" y2="15" stroke="#4caf50" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="10" y2="15" stroke="#4caf50" stroke-width="3" stroke-linecap="round"/>
    <text x="15" y="30" font-size="14" font-weight="bold" fill="#4caf50">10+ Years</text>
  </g>
  
  <!-- Users/Team count -->
  <g transform="translate(420, 380)">
    <circle cx="15" cy="20" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="28" cy="25" r="12" fill="#7b68ee" opacity="0.8"/>
    <circle cx="32" cy="12" r="12" fill="#ff6b6b" opacity="0.8"/>
    <text x="20" y="70" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">150+ Team</text>
  </g>
  
  <!-- Handshake -->
  <g transform="translate(250, 480)">
    <path d="M 20 20 Q 30 10 40 15 L 45 25 Q 35 30 25 25 Z" fill="#4a90e2"/>
    <path d="M 40 15 Q 50 10 60 20 L 55 30 Q 45 28 45 25 Z" fill="#7b68ee"/>
    <text x="40" y="60" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Partnership</text>
  </g>
</svg>