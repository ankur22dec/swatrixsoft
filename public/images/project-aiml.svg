<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b68ee;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4a90e2;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#aiGrad)"/>
  
  <!-- AI/ML Dashboard -->
  <g transform="translate(60, 40)">
    <!-- Chart bars -->
    <rect x="10" y="40" width="12" height="45" fill="#4a90e2" rx="2"/>
    <rect x="28" y="30" width="12" height="55" fill="#7b68ee" rx="2"/>
    <rect x="46" y="20" width="12" height="65" fill="#ff6b6b" rx="2"/>
    <rect x="64" y="35" width="12" height="50" fill="#4caf50" rx="2"/>
    <!-- AI nodes/neurons -->
    <circle cx="25" cy="15" r="3" fill="#7b68ee"/>
    <circle cx="45" cy="10" r="3" fill="#4a90e2"/>
    <circle cx="65" cy="12" r="3" fill="#ff6b6b"/>
    <!-- Connections -->
    <line x1="25" y1="17" x2="45" y2="12" stroke="#7b68ee" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="12" x2="65" y2="14" stroke="#4a90e2" stroke-width="1" opacity="0.5"/>
    <!-- Data points -->
    <circle cx="20" cy="50" r="1.5" fill="#4a90e2" opacity="0.7"/>
    <circle cx="35" cy="55" r="1.5" fill="#7b68ee" opacity="0.7"/>
    <circle cx="55" cy="45" r="1.5" fill="#ff6b6b" opacity="0.7"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="250" font-size="16" text-anchor="middle" fill="#333" font-weight="bold">AI Analytics Dashboard</text>
  <text x="200" y="275" font-size="12" text-anchor="middle" fill="#666">AI & ML Solutions</text>
</svg>