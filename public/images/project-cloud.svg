<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#cloudGrad)"/>
  
  <!-- Cloud Migration visualization -->
  <g transform="translate(40, 50)">
    <!-- On-premise servers (left) -->
    <rect x="10" y="20" width="35" height="10" fill="#666" stroke="#333" stroke-width="1.5" rx="1"/>
    <circle cx="17" cy="25" r="2" fill="#ff0000"/>
    <circle cx="27" cy="25" r="2" fill="#ffb300"/>
    <circle cx="37" cy="25" r="2" fill="#4caf50"/>
    
    <rect x="10" y="35" width="35" height="10" fill="#777" stroke="#333" stroke-width="1.5" rx="1"/>
    <circle cx="17" cy="40" r="2" fill="#ff0000"/>
    <circle cx="27" cy="40" r="2" fill="#ffb300"/>
    <circle cx="37" cy="40" r="2" fill="#4caf50"/>
    
    <!-- Migration arrow -->
    <g transform="translate(50, 30)">
      <path d="M 0 5 L 20 5" stroke="#4a90e2" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="20,5 15,2 15,8" fill="#4a90e2"/>
      <text x="10" y="-2" font-size="10" text-anchor="middle" fill="#4a90e2" font-weight="bold">Cloud</text>
    </g>
    
    <!-- Cloud (right) -->
    <path d="M 85 18 Q 80 10 92 8 Q 105 6 110 15 Q 118 8 120 20 Q 125 18 125 28 Q 120 35 110 37 Q 95 40 85 35 Q 75 37 85 18 Z" 
          fill="#ff6b6b" stroke="#ff5252" stroke-width="1.5"/>
    
    <!-- Servers in cloud -->
    <rect x="95" y="20" width="18" height="5" rx="1" fill="white" opacity="0.8"/>
    <rect x="98" y="28" width="12" height="3.5" rx="1" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Benefit indicator -->
  <g transform="translate(280, 80)">
    <text x="0" y="0" font-size="28" fill="#4caf50" font-weight="bold">-40%</text>
    <text x="0" y="18" font-size="11" text-anchor="start" fill="#333">Cost Savings</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="250" font-size="16" text-anchor="middle" fill="#333" font-weight="bold">Cloud Migration</text>
  <text x="200" y="275" font-size="12" text-anchor="middle" fill="#666">Cloud Infrastructure</text>
</svg>