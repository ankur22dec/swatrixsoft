<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="erpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b68ee;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4a90e2;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#erpGrad)"/>
  
  <!-- ERP System visualization -->
  <g transform="translate(50, 45)">
    <!-- Central hub -->
    <circle cx="60" cy="40" r="12" fill="#4a90e2" stroke="#4a90e2" stroke-width="2"/>
    <text x="60" y="44" font-size="8" text-anchor="middle" fill="white" font-weight="bold">ERP</text>
    
    <!-- Connected modules -->
    <!-- Finance -->
    <circle cx="20" cy="20" r="8" fill="#4a90e2" opacity="0.7"/>
    <text x="20" y="23" font-size="7" text-anchor="middle" fill="white" font-weight="bold">$</text>
    <line x1="28" y1="28" x2="50" y2="36" stroke="#4a90e2" stroke-width="1.5" opacity="0.5"/>
    
    <!-- HR -->
    <circle cx="100" cy="20" r="8" fill="#7b68ee" opacity="0.7"/>
    <text x="100" y="24" font-size="7" text-anchor="middle" fill="white" font-weight="bold">👥</text>
    <line x1="92" y1="28" x2="70" y2="36" stroke="#7b68ee" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Supply Chain -->
    <circle cx="20" cy="60" r="8" fill="#ff6b6b" opacity="0.7"/>
    <text x="20" y="63" font-size="7" text-anchor="middle" fill="white" font-weight="bold">📦</text>
    <line x1="28" y1="52" x2="50" y2="44" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Analytics -->
    <circle cx="100" cy="60" r="8" fill="#ffb300" opacity="0.7"/>
    <text x="100" y="64" font-size="7" text-anchor="middle" fill="white" font-weight="bold">📊</text>
    <line x1="92" y1="52" x2="70" y2="44" stroke="#ffb300" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="250" font-size="16" text-anchor="middle" fill="#333" font-weight="bold">Enterprise ERP System</text>
  <text x="200" y="275" font-size="12" text-anchor="middle" fill="#666">Enterprise Solutions</text>
</svg>