<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4a90e2;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#iotGrad)"/>
  
  <!-- IoT Platform visualization -->
  <g transform="translate(50, 40)">
    <!-- Sensors/Devices -->
    <!-- Sensor 1 -->
    <rect x="10" y="10" width="18" height="18" rx="2" fill="#4caf50" stroke="#4caf50" stroke-width="1.5"/>
    <circle cx="19" cy="19" r="3" fill="white" opacity="0.8"/>
    
    <!-- Sensor 2 -->
    <rect x="35" y="5" width="18" height="18" rx="2" fill="#4a90e2" stroke="#4a90e2" stroke-width="1.5"/>
    <circle cx="44" cy="14" r="3" fill="white" opacity="0.8"/>
    
    <!-- Sensor 3 -->
    <rect x="60" y="12" width="18" height="18" rx="2" fill="#7b68ee" stroke="#7b68ee" stroke-width="1.5"/>
    <circle cx="69" cy="21" r="3" fill="white" opacity="0.8"/>
    
    <!-- Sensor 4 -->
    <rect x="10" y="35" width="18" height="18" rx="2" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1.5"/>
    <circle cx="19" cy="44" r="3" fill="white" opacity="0.8"/>
    
    <!-- Sensor 5 -->
    <rect x="60" y="38" width="18" height="18" rx="2" fill="#ffb300" stroke="#ffb300" stroke-width="1.5"/>
    <circle cx="69" cy="47" r="3" fill="white" opacity="0.8"/>
    
    <!-- Central processor -->
    <circle cx="45" cy="45" r="8" fill="#333" stroke="#666" stroke-width="2"/>
    <circle cx="45" cy="45" r="5" fill="#4a90e2" opacity="0.8"/>
    
    <!-- Data flow lines -->
    <line x1="29" y1="19" x2="40" y2="42" stroke="#4caf50" stroke-width="1" opacity="0.6" stroke-dasharray="2,2"/>
    <line x1="44" y1="14" x2="44" y2="37" stroke="#4a90e2" stroke-width="1" opacity="0.6" stroke-dasharray="2,2"/>
    <line x1="69" y1="21" x2="50" y2="42" stroke="#7b68ee" stroke-width="1" opacity="0.6" stroke-dasharray="2,2"/>
    <line x1="19" y1="44" x2="37" y2="45" stroke="#ff6b6b" stroke-width="1" opacity="0.6" stroke-dasharray="2,2"/>
    <line x1="69" y1="47" x2="53" y2="47" stroke="#ffb300" stroke-width="1" opacity="0.6" stroke-dasharray="2,2"/>
  </g>
  
  <!-- Data metric -->
  <g transform="translate(260, 90)">
    <text x="0" y="0" font-size="26" fill="#4a90e2" font-weight="bold">1M+</text>
    <text x="0" y="16" font-size="11" text-anchor="start" fill="#333">Data Points/Day</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="250" font-size="16" text-anchor="middle" fill="#333" font-weight="bold">IoT Platform</text>
  <text x="200" y="275" font-size="12" text-anchor="middle" fill="#666">IoT & DevOps</text>
</svg>