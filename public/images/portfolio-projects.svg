<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b68ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="500" fill="#f8f9fc"/>
  <circle cx="100" cy="100" r="70" fill="#4a90e2" opacity="0.08"/>
  <circle cx="500" cy="450" r="80" fill="#7b68ee" opacity="0.08"/>
  
  <!-- E-Commerce/Shop Building -->
  <g transform="translate(150, 80)">
    <!-- Building -->
    <rect x="20" y="60" width="80" height="120" fill="url(#shopGrad)" stroke="#4a90e2" stroke-width="2"/>
    <!-- Roof -->
    <polygon points="20,60 60,10 100,60" fill="#7b68ee" stroke="#4a90e2" stroke-width="1.5"/>
    <!-- Door -->
    <rect x="48" y="140" width="24" height="40" fill="#333" stroke="#4a90e2" stroke-width="1"/>
    <circle cx="70" cy="160" r="3" fill="#ffd700"/>
    <!-- Windows -->
    <rect x="32" y="85" width="15" height="15" fill="#4a90e2" opacity="0.6"/>
    <rect x="53" y="85" width="15" height="15" fill="#4a90e2" opacity="0.6"/>
    <rect x="74" y="85" width="15" height="15" fill="#4a90e2" opacity="0.6"/>
    <rect x="32" y="110" width="15" height="15" fill="#4a90e2" opacity="0.6"/>
    <rect x="53" y="110" width="15" height="15" fill="#4a90e2" opacity="0.6"/>
    <rect x="74" y="110" width="15" height="15" fill="#4a90e2" opacity="0.6"/>
    <!-- Flag -->
    <rect x="95" y="8" width="2" height="10" fill="#333"/>
    <polygon points="97,8 97,15 105,12" fill="#ff6b6b"/>
    <text x="60" y="220" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">E-Commerce</text>
  </g>
  
  <!-- Mobile App -->
  <g transform="translate(390, 80)">
    <!-- Phone -->
    <rect x="15" y="20" width="50" height="100" rx="4" fill="#4a90e2" stroke="#4a90e2" stroke-width="2"/>
    <!-- Screen -->
    <rect x="20" y="28" width="40" height="80" fill="#1a1a1a" rx="2"/>
    <!-- App icons -->
    <rect x="26" y="35" width="8" height="8" fill="#ff6b6b" rx="1"/>
    <rect x="37" y="35" width="8" height="8" fill="#4caf50" rx="1"/>
    <rect x="26" y="48" width="8" height="8" fill="#ffb300" rx="1"/>
    <rect x="37" y="48" width="8" height="8" fill="#4a90e2" rx="1"/>
    <rect x="26" y="61" width="19" height="6" fill="#7b68ee" rx="2" opacity="0.7"/>
    <rect x="26" y="71" width="19" height="6" fill="#4a90e2" rx="2" opacity="0.7"/>
    <!-- Home button -->
    <circle cx="40" cy="113" r="3" fill="#999"/>
    <text x="40" y="160" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Mobile Apps</text>
  </g>
  
  <!-- Cloud Services -->
  <g transform="translate(150, 290)">
    <!-- Cloud -->
    <path d="M 30 50 Q 20 35 35 25 Q 50 15 60 30 Q 75 20 80 40 Q 85 35 90 50 Q 85 65 70 70 Q 50 75 35 70 Q 20 72 30 50 Z" 
          fill="#ff6b6b" stroke="#ff5252" stroke-width="2"/>
    <!-- Servers in cloud -->
    <rect x="40" y="45" width="25" height="5" rx="1" fill="white" opacity="0.8"/>
    <rect x="45" y="55" width="15" height="4" rx="1" fill="white" opacity="0.7"/>
    <rect x="42" y="63" width="20" height="4" rx="1" fill="white" opacity="0.7"/>
    <text x="60" y="110" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Cloud Services</text>
  </g>
  
  <!-- AI/ML -->
  <g transform="translate(390, 290)">
    <!-- Brain/AI symbol -->
    <circle cx="40" cy="35" r="5" fill="#7b68ee"/>
    <circle cx="30" cy="45" r="4" fill="#7b68ee"/>
    <circle cx="50" cy="45" r="4" fill="#7b68ee"/>
    <circle cx="25" cy="55" r="3.5" fill="#7b68ee"/>
    <circle cx="55" cy="55" r="3.5" fill="#7b68ee"/>
    <!-- Connections -->
    <line x1="40" y1="40" x2="30" y2="45" stroke="#7b68ee" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="40" x2="50" y2="45" stroke="#7b68ee" stroke-width="1" opacity="0.6"/>
    <line x1="30" y1="49" x2="25" y2="55" stroke="#7b68ee" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="49" x2="55" y2="55" stroke="#7b68ee" stroke-width="1" opacity="0.6"/>
    <!-- Data flow -->
    <circle cx="40" cy="35" r="15" fill="none" stroke="#7b68ee" stroke-width="1" opacity="0.3"/>
    <text x="40" y="110" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">AI & ML Solutions</text>
  </g>
  
  <!-- Enterprise Software -->
  <g transform="translate(150, 380)">
    <!-- Data structure/layers -->
    <rect x="20" y="20" width="60" height="12" fill="#4a90e2" stroke="#4a90e2" stroke-width="1.5" rx="2"/>
    <rect x="20" y="37" width="60" height="12" fill="#7b68ee" stroke="#7b68ee" stroke-width="1.5" rx="2"/>
    <rect x="20" y="54" width="60" height="12" fill="#4a90e2" stroke="#4a90e2" stroke-width="1.5" rx="2"/>
    <!-- Connection arrows -->
    <line x1="50" y1="32" x2="50" y2="37" stroke="#999" stroke-width="1"/>
    <line x1="50" y1="49" x2="50" y2="54" stroke="#999" stroke-width="1"/>
    <text x="50" y="110" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Enterprise Software</text>
  </g>
  
  <!-- Security/Cybersecurity -->
  <g transform="translate(390, 380)">
    <!-- Shield with lock -->
    <path d="M 28 20 L 28 38 Q 28 50 40 56 Q 52 50 52 38 L 52 20 Z" 
          fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linejoin="round"/>
    <!-- Lock -->
    <rect x="32" y="35" width="16" height="15" rx="1" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <path d="M 36 35 L 36 30 Q 36 25 40 25 Q 44 25 44 30 L 44 35" fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="40" cy="43" r="1.5" fill="#ff6b6b"/>
    <text x="40" y="110" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Security & DevOps</text>
  </g>
</svg>