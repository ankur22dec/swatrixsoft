<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7b68ee;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#shopGrad)"/>
  
  <!-- E-Commerce Platform visualization -->
  <g transform="translate(50, 50)">
    <!-- Shopping cart -->
    <path d="M 20 40 L 30 15 L 90 15 L 95 40 Z" fill="none" stroke="#4a90e2" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="35" cy="45" r="5" fill="#4a90e2"/>
    <circle cx="80" cy="45" r="5" fill="#4a90e2"/>
    <!-- Products inside cart -->
    <rect x="40" y="25" width="15" height="15" fill="#ff6b6b" opacity="0.7"/>
    <rect x="60" y="20" width="12" height="12" fill="#ffb300" opacity="0.7"/>
    <!-- Growth indicator -->
    <g transform="translate(40, 70)">
      <line x1="0" y1="30" x2="0" y2="0" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="-5" y2="8" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="5" y2="8" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round"/>
      <text x="10" y="20" font-size="12" fill="#4caf50" font-weight="bold">+300%</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="200" y="250" font-size="16" text-anchor="middle" fill="#333" font-weight="bold">E-Commerce Platform</text>
  <text x="200" y="275" font-size="12" text-anchor="middle" fill="#666">Web Development</text>
</svg>